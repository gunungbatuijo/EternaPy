kind = "web"
previewPath = "/"
title = "EternaPy"
version = "1.0.0"
id = "artifacts/eternapy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22202

[services.development]
run = "pnpm --filter @workspace/eternapy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/eternapy", "run", "build" ]
publicDir = "artifacts/eternapy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22202"
BASE_PATH = "/"
